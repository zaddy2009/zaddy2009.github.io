<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stupidly's Doxbin</title>
<style>
html,body{
    margin:0;
    height:100%;
    background:#000;
    color:#fff;
    overflow:auto;
    font-family:Consolas,monospace;
}
.content{
    width:min(1000px,90%);
    margin:40px auto;
}
.box{
    border:1px solid #fff;
    background:rgba(0,0,0,.85);
    padding:20px;
    box-shadow:0 0 20px #fff;
    margin-bottom:20px;
}
.image-container{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:20px;
}
.image-container img{
    max-width:300px;
    height:auto;
}
h1,h2{
    text-align:center;
    text-shadow:0 0 15px #fff;
}
h1{
    position:relative;
    animation:glitch 1.5s infinite;
}
h1::before,
h1::after{
    content:attr(data-text);
    position:absolute;
    left:0;
    width:100%;
    overflow:hidden;
    opacity:.8;
}
h1::before{
    animation:glitchTop 1s infinite;
}
h1::after{
    animation:glitchBottom 1s infinite;
}
@keyframes glitch{
    0%,100%{
        transform:translate(0);
    }
    20%{
        transform:translate(-2px,2px);
    }
    40%{
        transform:translate(2px,-2px);
    }
    60%{
        transform:translate(-1px,1px);
    }
}
@keyframes glitchTop{
    0%,100%{
        clip-path:inset(0 0 80% 0);
    }
    50%{
        clip-path:inset(10% 0 60% 0);
        transform:translate(-4px,-2px);
    }
}
@keyframes glitchBottom{
    0%,100%{
        clip-path:inset(80% 0 0 0);
    }
    50%{
        clip-path:inset(60% 0 10% 0);
        transform:translate(4px,2px);
    }
}
p,li,b,small{
    text-shadow:0 0 8px #fff;
}
.cursor{
    animation:blink 1s infinite;
}
@keyframes blink{
    50%{
        opacity:0;
    }
}
.terminal{
    border:1px solid #fff;
    padding:10px;
    margin-top:15px;
    background:#050505;
    box-shadow:0 0 15px #fff;
    min-height:80px;
}
.case{
    border-top:1px solid #fff;
    margin-top:15px;
    padding-top:15px;
}

/* Navigation */
nav {
    background: rgba(0,0,0,0.95);
    border-bottom: 1px solid #fff;
    padding: 15px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 0 15px #fff;
}

.nav-container {
    width: min(1000px, 90%);
    margin: 0 auto;
    display: flex;
    justify-content: center;
    gap: 30px;
}

.nav-link {
    color: #fff;
    text-decoration: none;
    font-size: 1.1em;
    text-shadow: 0 0 10px #fff;
    transition: all 0.3s;
    cursor: pointer;
    padding: 5px 15px;
}

.nav-link:hover, .nav-link.active {
    color: #0ff;
    text-shadow: 0 0 20px #0ff;
    background: rgba(0,255,255,0.1);
}

/* Tabs */
.tab-content {
    display: none;
}
.tab-content.active {
    display: block;
}

/* Upgrades */
.upgrades-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.upgrade-card {
    border: 1px solid #fff;
    background: rgba(10,10,10,0.95);
    padding: 20px;
    text-align: center;
    transition: all 0.4s;
    box-shadow: 0 0 15px #fff;
}

.upgrade-card:hover {
    transform: scale(1.05) translateY(-10px);
    box-shadow: 0 0 30px #0ff;
    border-color: #0ff;
}

.price {
    font-size: 2em;
    color: #0f0;
    text-shadow: 0 0 15px #0f0;
    margin: 15px 0;
}

.buy-btn {
    background: transparent;
    border: 1px solid #fff;
    color: #fff;
    padding: 10px 25px;
    font-family: Consolas, monospace;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 10px;
}

.buy-btn:hover {
    background: #fff;
    color: #000;
    box-shadow: 0 0 20px #0ff;
}

/* Song */
.lyrics {
    white-space: pre-wrap;
    font-size: 1.1em;
    line-height: 1.6;
    background: #0a0a0a;
    padding: 25px;
    border: 1px solid #fff;
    box-shadow: 0 0 15px #0ff;
    text-align: center;
}

/* Foxy Jumpscare */
#jumpscare {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

#jumpscare img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    animation: foxyflash 0.8s infinite alternate;
}

@keyframes foxyflash {
    from { filter: brightness(1) hue-rotate(0deg); }
    to { filter: brightness(2) hue-rotate(30deg); }
}
